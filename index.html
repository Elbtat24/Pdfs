<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Mohamed Albtat">
    <title>اجابات الولية - المولد الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --main: #6c5ce7;
            --sec: #00b894;
            --bg: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            text-align: center; 
            background: var(--bg); 
            margin: 0; color: #2d3436;
        }

        /* شريط الأدوات */
        .actions-bar { 
            position: sticky; top: 0; z-index: 999;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; justify-content: center; gap: 15px;
        }

        button { 
            font-family: inherit; padding: 12px 30px; font-size: 16px; 
            cursor: pointer; border: none; border-radius: 50px; 
            font-weight: bold; color: #fff;
            transition: all 0.3s ease;
        }

        .btn-gen { background: linear-gradient(135deg, var(--main), #a29bfe); }
        .btn-gen:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4); }

        .btn-dl { background: linear-gradient(135deg, var(--sec), #55efc4); }
        .btn-dl:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 184, 148, 0.4); }

        /* حاوية الأوراق */
        .print-wrap { 
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px auto; 
            transition: opacity 0.35s ease;
        }
        .ghost { opacity: 0 !important; transform: scale(0.98); }

        /* تصميم الورقة */
        .sheet { 
            width: 210mm; 
            /* قللنا الطول ملي واحد لضمان عدم الترحيل */
            height: 295mm; 
            padding: 5mm; 
            page-break-after: always; 
            page-break-inside: avoid !important;
            display: flex; flex-direction: column; 
            gap: 10px; 
            justify-content: space-evenly; align-items: center; 
            box-sizing: border-box; 
            margin-bottom: 25px;
            background: #fff; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden; 
        }

        /* حاوية الصورة */
        .pic-wrap { 
            padding: 5px; 
            border-radius: 12px; background: #fff; 
            width: 96%; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0; 
            box-sizing: border-box;
            page-break-inside: avoid !important;
        }

        .pic-wrap img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain;
            display: block; margin: auto; border-radius: 8px;
        }

        /* تعديلات الطباعة لإلغاء أي هوامش خارجية */
        @media print {
            .actions-bar { display: none !important; }
            body { background: #fff; margin: 0; padding: 0; }
            .sheet { 
                margin: 0 !important; 
                border-radius: 0; 
                box-shadow: none; 
                /* نلغي الفريم العشوائي وقت الطباعة الفعلية لو بيعمل مشاكل */
                border: none !important; 
                height: 297mm; /* نرجعها لمقاس الـ A4 الكامل في الطباعة */
            }
        }
    </style>
</head>
<body>

    <div class="actions-bar">
        <button class="btn-gen" onclick="triggerMix()">العب في النماذج 🎲</button>
        <button class="btn-dl" onclick="getPDF()">حمل الـ PDF 📥</button>
    </div>

    <div id="paperArea" class="print-wrap"></div>

    <script>
        const bStyles = ['solid', 'dashed', 'dotted', 'double'];
        const pColors = ['#2c3e50', '#c0392b', '#27ae60', '#d35400', '#8e44ad', '#16a085', '#2980b9'];

        document.addEventListener('DOMContentLoaded', () => {
            const area = document.getElementById('paperArea');
            for (let i = 1; i <= 16; i++) {
                let pg = document.createElement('div');
                pg.className = 'sheet';
                let picsNum = [5, 6, 11, 16].includes(i) ? 2 : 3;
                let imgsHtml = '';
                for (let j = 1; j <= picsNum; j++) {
                    imgsHtml += `<div class="pic-wrap"><img src="img/p${i}_${j}.jpg" onerror="this.src='https://via.placeholder.com/600x200?text=Missing+p${i}_${j}'"></div>`;
                }
                pg.innerHTML = imgsHtml;
                area.appendChild(pg);
            }
            mixItUp();
        });

        const triggerMix = () => {
            const wrap = document.getElementById('paperArea');
            wrap.classList.add('ghost');
            setTimeout(() => { mixItUp(); wrap.classList.remove('ghost'); }, 350);
        }

        const mixItUp = () => {
            document.querySelectorAll('.sheet').forEach(s => {
                let items = Array.from(s.querySelectorAll('.pic-wrap'));
                items.sort(() => Math.random() - 0.5); 
                items.forEach(el => s.appendChild(el)); 

                let rndStyle = bStyles[Math.floor(Math.random() * bStyles.length)];
                let rndColor = pColors[Math.floor(Math.random() * pColors.length)];
                let rndWidth = Math.floor(Math.random() * 4) + 2; 
                s.style.border = `${rndWidth}px ${rndStyle} ${rndColor}`;
                
                items.forEach(pic => {
                    let img = pic.querySelector('img');
                    pic.style.border = `3px solid ${pColors[Math.floor(Math.random() * pColors.length)]}`;
                    pic.style.transform = `rotate(${(Math.random() - 0.5) * 1}deg)`;
                });
            });
        }

        const getPDF = () => {
            const actionBar = document.querySelector('.actions-bar');
            actionBar.style.display = 'none';

            const opt = {
                margin: 0, 
                filename: 'El_Mlokhia_V2.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 1.5, 
                    useCORS: true, 
                    letterRendering: true,
                    scrollY: 0 // مهم جداً لمنع ترحيل العناصر بسبب السكرول
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'], avoid: ['.sheet', '.pic-wrap'] }
            };

            html2pdf().set(opt).from(document.getElementById('paperArea')).save().then(() => {
                actionBar.style.display = 'flex';
            });
        }
    </script>
</body>
</html>
