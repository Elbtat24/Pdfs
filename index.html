<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Mohamed Albtat">
    <title>اجابات الولية - المولد الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --main: #6c5ce7;
            --sec: #00b894;
            --bg: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            text-align: center; 
            background: var(--bg); 
            margin: 0; color: #2d3436;
        }

        /* شريط الأدوات */
        .actions-bar { 
            position: sticky; top: 0; z-index: 999;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; justify-content: center; gap: 15px;
        }

        button { 
            font-family: inherit; padding: 12px 30px; font-size: 16px; 
            cursor: pointer; border: none; border-radius: 50px; 
            font-weight: bold; color: #fff;
            transition: all 0.3s ease;
        }

        .btn-gen { background: linear-gradient(135deg, var(--main), #a29bfe); }
        .btn-gen:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4); }

        .btn-dl { background: linear-gradient(135deg, var(--sec), #55efc4); }
        .btn-dl:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 184, 148, 0.4); }

        /* حاوية الأوراق */
        .print-wrap { 
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px auto; 
            transition: opacity 0.35s ease;
        }
        .ghost { opacity: 0 !important; transform: scale(0.98); }

        /* تصميم الورقة - مقاس A4 رسمي */
        .sheet { 
            width: 210mm; 
            height: 296mm; 
            padding: 5mm; 
            page-break-inside: avoid !important;
            break-inside: avoid !important;
            display: flex; flex-direction: column; 
            gap: 15px; 
            justify-content: space-evenly; align-items: center; 
            box-sizing: border-box; margin-bottom: 20px;
            background: #fff; 
            transition: all 0.4s ease;
            overflow: hidden; 
            border: none; 
        }
        .sheet:last-child { page-break-after: auto; }

        /* حاوية الصورة */
        .pic-wrap { 
            padding: 5px; 
            border-radius: 12px; background: #fff; 
            width: 96%; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0; 
            box-sizing: border-box;
            page-break-inside: avoid !important;
            break-inside: avoid !important;
        }

        /* الصورة نفسها */
        .pic-wrap img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain;
            display: block; margin: auto; border-radius: 8px;
        }

        @media print {
            .actions-bar { display: none !important; }
            body { background: #fff; }
            .sheet { 
                margin: 0 !important; 
                padding: 5mm !important;
                border-radius: 0; 
                box-shadow: none; 
                border: none !important; 
                height: 296mm !important;
                page-break-after: auto !important;
            }
        }
    </style>
</head>
<body>

    <div class="actions-bar">
        <button class="btn-gen" onclick="triggerMix()">العب في النماذج 🎲</button>
        <button class="btn-dl" onclick="getPDF()">حمل الـ PDF 📥</button>
    </div>

    <div id="paperArea" class="print-wrap"></div>

    <script>
        const pColors = ['#2c3e50', '#c0392b', '#27ae60', '#d35400', '#8e44ad', '#16a085', '#2980b9'];

        // تهيئة التطبيق
        document.addEventListener('DOMContentLoaded', () => {
            const area = document.getElementById('paperArea');
            
            for (let i = 1; i <= 16; i++) {
                let pg = document.createElement('div');
                pg.className = 'sheet';
                
                // استثناء الورق اللي فيه صورتين بس
                let picsNum = [5, 6, 11, 16].includes(i) ? 2 : 3;
                
                let imgsHtml = '';
                for (let j = 1; j <= picsNum; j++) {
                    imgsHtml += `
                        <div class="pic-wrap">
                            <img src="img/p${i}_${j}.jpg" onerror="this.src='https://via.placeholder.com/600x200?text=Missing+p${i}_${j}'">
                        </div>`;
                }
                pg.innerHTML = imgsHtml;
                area.appendChild(pg);
            }

            mixItUp();
            console.log("App Initialized by Albtat 🚀");
        });

        const triggerMix = () => {
            const wrap = document.getElementById('paperArea');
            wrap.classList.add('ghost');
            setTimeout(() => {
                mixItUp();
                wrap.classList.remove('ghost');
            }, 350);
        }

        const mixItUp = () => {
            document.querySelectorAll('.sheet').forEach(s => {
                let items = Array.from(s.querySelectorAll('.pic-wrap'));
                items.sort(() => Math.random() - 0.5); 
                items.forEach(el => s.appendChild(el)); 

                s.style.background = Math.random() > 0.5 ? '#fcfcfc' : '#ffffff';
                s.style.border = 'none'; 

                items.forEach(pic => {
                    let img = pic.querySelector('img');
                    pic.style.border = `3px solid ${pColors[Math.floor(Math.random() * pColors.length)]}`;
                    pic.style.transform = `rotate(${(Math.random() - 0.5) * 1.5}deg)`;

                    let sp = Math.random() * 0.15; 
                    let cn = 0.9 + Math.random() * 0.2; 
                    let br = 0.95 + Math.random() * 0.1; 
                    let hr = Math.floor(Math.random() * 15) - 7; 
                    img.style.filter = `sepia(${sp}) contrast(${cn}) brightness(${br}) hue-rotate(${hr}deg)`;
                });
            });
        }

        // حفظ ملف الـ PDF
        const getPDF = () => {
            const actionBar = document.querySelector('.actions-bar');
            const paperArea = document.getElementById('paperArea');
            const sheets = document.querySelectorAll('.sheet');

            // 1. إخفاء الأزرار
            actionBar.style.display = 'none'; 

            // 2. إزالة المسافات مؤقتاً لتجنب الصفحات البيضاء
            paperArea.style.margin = '0';
            sheets.forEach((sheet, index) => {
                sheet.style.marginBottom = '0';
                sheet.style.pageBreakAfter = index === sheets.length - 1 ? 'auto' : 'always';
            });

            const opt = {
                margin: 0, 
                filename: 'El_Mlokhia_V2.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true, 
                    letterRendering: true,
                    scrollY: 0
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css'] } 
            };

            html2pdf().set(opt).from(paperArea).save().then(() => {
                // 3. إرجاع المسافات والأزرار بعد التحميل
                actionBar.style.display = 'flex';
                paperArea.style.margin = '30px auto';
                sheets.forEach(sheet => {
                    sheet.style.marginBottom = '20px';
                });
            }).catch(err => {
                console.error("PDF Error: ", err);
                actionBar.style.display = 'flex';
                // تأمين رجوع التصميم في حالة حدوث خطأ
                paperArea.style.margin = '30px auto';
                sheets.forEach(sheet => {
                    sheet.style.marginBottom = '20px';
                });
            });
        }
    </script>
</body>
</html>
