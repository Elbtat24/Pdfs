<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Mohamed Albtat">
    <title>اجابات الولية - المولد الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --main: #6c5ce7;
            --sec: #00b894;
            --bg: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            text-align: center; 
            background: var(--bg); 
            margin: 0; color: #2d3436;
        }

        /* Nav */
        .actions-bar { 
            position: sticky; top: 0; z-index: 999;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; justify-content: center; gap: 15px;
        }

        button { 
            font-family: inherit; padding: 12px 30px; font-size: 16px; 
            cursor: pointer; border: none; border-radius: 50px; 
            font-weight: bold; color: #fff;
            transition: all 0.3s ease;
        }

        .btn-gen { background: linear-gradient(135deg, var(--main), #a29bfe); }
        .btn-gen:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4); }

        .btn-dl { background: linear-gradient(135deg, var(--sec), #55efc4); }
        .btn-dl:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 184, 148, 0.4); }

        /* Wrapper */
        .print-wrap { 
            /* شلنا العرض الثابت عشان الورقة هي اللي تتحكم */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px auto; 
            transition: opacity 0.35s ease;
        }
        .ghost { opacity: 0 !important; transform: scale(0.98); }

        /* Sheet styling - تم التعديل لتطابق A4 */
        .sheet { 
            width: 210mm; /* عرض الـ A4 */
            height: 296mm; /* طول الـ A4 (أقل 1 ملي عشان ميفتحش ورقة بيضاء زيادة) */
            padding: 15mm; /* حواف داخلية للورقة */
            page-break-after: always; 
            page-break-inside: avoid;
            display: flex; flex-direction: column; 
            gap: 20px; justify-content: space-evenly; align-items: center; 
            box-sizing: border-box; margin-bottom: 25px;
            background: #fff; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.4s ease;
            overflow: hidden; /* يمنع أي محتوى من الخروج برا الورقة */
        }
        .sheet:last-child { page-break-after: auto; }

        /* Container الصورة */
        .pic-wrap { 
            padding: 10px; border-radius: 12px; background: #fff; 
            width: 90%; box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            flex: 1; /* سحر الـ Flexbox: هيقسم المساحة المتاحة بالتساوي سواء كانوا 2 أو 3 صور */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0; /* مهم جداً عشان الصورة تصغر ومتبوظش الـ flex */
            box-sizing: border-box;
        }

        /* الصورة نفسها */
        .pic-wrap img { 
            max-width: 100%; 
            max-height: 100%; /* الصورة هتاخد أقصى ارتفاع من الحاوية بتاعتها فقط */
            object-fit: contain;
            display: block; margin: auto; border-radius: 8px;
        }

        /* تعديلات وقت الطباعة عشان نشيل الظل والحواف الدائرية */
        @media print {
            .actions-bar { display: none !important; }
            body { background: #fff; }
            .sheet { 
                margin: 0; border-radius: 0; box-shadow: none; border: none !important; 
                height: 297mm;
            }
        }
    </style>
</head>
<body>

    <div class="actions-bar">
        <button class="btn-gen" onclick="triggerMix()">العب في النماذج 🎲</button>
        <button class="btn-dl" onclick="getPDF()">حمل الـ PDF 📥</button>
    </div>

    <div id="paperArea" class="print-wrap"></div>

    <script>
        const bStyles = ['solid', 'dashed', 'dotted', 'double'];
        const pColors = ['#2c3e50', '#c0392b', '#27ae60', '#d35400', '#8e44ad', '#16a085', '#2980b9'];

        // Init App
        document.addEventListener('DOMContentLoaded', () => {
            const area = document.getElementById('paperArea');
            
            for (let i = 1; i <= 16; i++) {
                let pg = document.createElement('div');
                pg.className = 'sheet';
                
                // استثناء الورق اللي فيه صورتين بس
                let picsNum = [5, 6, 11, 16].includes(i) ? 2 : 3;
                
                let imgsHtml = '';
                for (let j = 1; j <= picsNum; j++) {
                    imgsHtml += `
                        <div class="pic-wrap">
                            <img src="img/p${i}_${j}.jpg" onerror="this.src='https://via.placeholder.com/600x200?text=Missing+p${i}_${j}'">
                        </div>`;
                }
                pg.innerHTML = imgsHtml;
                area.appendChild(pg);
            }

            mixItUp(); // اول رنة
            console.log("App Initialized by Albtat 🚀");
        });

        // Animation before shuffle
        const triggerMix = () => {
            const wrap = document.getElementById('paperArea');
            wrap.classList.add('ghost');
            setTimeout(() => {
                mixItUp();
                wrap.classList.remove('ghost');
            }, 350);
        }

        // Core logic
        const mixItUp = () => {
            document.querySelectorAll('.sheet').forEach(s => {
                // لخبطة الصور
                let items = Array.from(s.querySelectorAll('.pic-wrap'));
                items.sort(() => Math.random() - 0.5); 
                items.forEach(el => s.appendChild(el)); 

                // ستايل عشوائي للورقة
                let rndStyle = bStyles[Math.floor(Math.random() * bStyles.length)];
                let rndColor = pColors[Math.floor(Math.random() * pColors.length)];
                let rndWidth = Math.floor(Math.random() * 4) + 2; 
                s.style.border = `${rndWidth}px ${rndStyle} ${rndColor}`;
                s.style.background = Math.random() > 0.5 ? '#fcfcfc' : '#ffffff';

                // ستايل عشوائي لكل صورة
                items.forEach(pic => {
                    let img = pic.querySelector('img');
                    pic.style.border = `3px solid ${pColors[Math.floor(Math.random() * pColors.length)]}`;
                    pic.style.transform = `rotate(${(Math.random() - 0.5) * 1.5}deg)`;

                    // لعب في الفلاتر
                    let sp = Math.random() * 0.15; 
                    let cn = 0.9 + Math.random() * 0.2; 
                    let br = 0.95 + Math.random() * 0.1; 
                    let hr = Math.floor(Math.random() * 15) - 7; 
                    img.style.filter = `sepia(${sp}) contrast(${cn}) brightness(${br}) hue-rotate(${hr}deg)`;
                });
            });
        }

        // Export
        const getPDF = () => {
            // خلينا المارجن 0 لأننا عاملين padding جوه الورقة نفسها (sheet.)
            html2pdf().set({
                margin: 0, 
                filename: 'El_Mlokhia_V2.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'] } // بيفهم المكتبة إنها تقص بناءً على كلاس sheet
            }).from(document.getElementById('paperArea')).save();
        }
    </script>
</body>
</html>
